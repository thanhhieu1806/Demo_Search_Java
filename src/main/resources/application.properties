spring.application.name=demo

# H2 File-based Database (persistent across restarts)
spring.datasource.url=jdbc:h2:file:./demodb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Debug logging for auth issues
logging.level.root=INFO
logging.level.com.example.demo.security=DEBUG
logging.level.com.example.demo.controller=DEBUG
logging.level.org.springframework.security=DEBUG

# H2 Console (optional, for debugging)
spring.h2.console.enabled=false

# Session cookie settings (override with env if needed)
server.servlet.session.cookie.same-site=${SESSION_SAMESITE:Lax}
server.servlet.session.cookie.secure=${SESSION_SECURE:false}
server.forward-headers-strategy=framework
server.error.include-message=always

# TMSRA integration (override by environment variables in production)
tmsra.base-url=${TMSRA_BASE_URL:https://113.161.43.188:9093/RegistrationAuthority/tmsra/restapi}
tmsra.username=${TMSRA_USERNAME:DL_01}
tmsra.password=${TMSRA_PASSWORD:a12345678@}
tmsra.language=${TMSRA_LANGUAGE:0}
tmsra.timeout-seconds=${TMSRA_TIMEOUT_SECONDS:30}
tmsra.insecure-ssl=${TMSRA_INSECURE_SSL:true}
