spring.application.name=demo

# Production database configuration (set via environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Session cookie settings (override with env if needed)
server.servlet.session.cookie.same-site=${SESSION_SAMESITE:Lax}
server.servlet.session.cookie.secure=${SESSION_SECURE:true}
server.forward-headers-strategy=framework
